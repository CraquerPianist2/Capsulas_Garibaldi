name: Compilar App para iOS

on:
  push:
    branches: [ main, master ] # Se activa al subir cambios a la rama principal

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Descargar Codigo
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compilar framework de iOS
        run: ./gradlew :composeApp:assembleDebugIosSimulatorFramework

      - name: Guardar ejecutable compilado
        uses: actions/upload-artifact@v4
        with:
          name: App-iOS-Compilada
          path: composeApp/build/ # Guarda la salida del build de iOS
