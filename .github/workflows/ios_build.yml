name: iOS Build (Simulator)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS Simulator Framework
        # Nota: Usamos :app porque es el nombre de tu módulo según tu estructura actual
        run: ./gradlew :app:assembleDebugIosSimulatorArm64Framework

      - name: Upload iOS Framework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework-debug
          path: |
            app/build/bin/iosSimulatorArm64/debugFramework/
            app/build/fat-framework/debug/
          if-no-files-found: warn
